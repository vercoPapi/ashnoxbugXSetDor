<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxx AI | Cyber-Core</title>
    <style>
        :root { --neon: #00f2ff; --neon-alt: #ff007f; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background: radial-gradient(circle at center, #1a0a1a, #000);
            display: flex; justify-content: center;
        }

        /* Container Full Responsive */
        .container { 
            width: 100%; height: 100%; display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
        }

        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        .logo-glow { 
            width: 40px; height: 40px; border-radius: 10px; margin: 0 auto 5px;
            background: linear-gradient(135deg, var(--neon), var(--neon-alt));
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #000; box-shadow: 0 0 15px var(--neon);
        }

        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .msg { padding: 12px 18px; border-radius: 15px; margin-bottom: 15px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: linear-gradient(90deg, #1a1a1a, #000); border: 1px solid var(--neon-alt); color: white; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: #fff; }

        .code-block { width: 90%; background: #000; border: 1px solid #333; border-radius: 8px; margin: 10px 0; }
        .code-top { background: #111; padding: 5px 10px; display: flex; justify-content: space-between; font-size: 10px; color: var(--neon); }
        .code-pre { padding: 10px; color: #fff; font-family: monospace; overflow-x: auto; margin: 0; font-size: 12px; }
        .btn-run { background: var(--neon); border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; }

        .input-wrap { padding: 15px; background: rgba(0,0,0,0.6); border-top: 1px solid #333; }
        .input-box { display: flex; background: #111; border: 1px solid #444; border-radius: 10px; overflow: hidden; }
        input { flex: 1; background: transparent; border: none; padding: 15px; color: white; outline: none; }
        button { background: var(--neon); border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-glow">NX</div>
        <div style="color:white; font-size: 12px; letter-spacing: 1px;">NOXX CYBER-CORE</div>
    </header>

    <div id="chat-box"></div>
    <div id="typing" style="color:var(--neon); padding-left:20px; font-size:10px; display:none;">Noxx is thinking...</div>

    <div class="input-wrap">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Type a command...">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AQ.Ab8RN6J5h49pfEz2Fe3qzGSVuCiIho4oOhAf8eBnVRxVPtSoaA";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`;

    async function sendMessage() {
        const input = document.getElementById('user-input');
        if (!input.value.trim()) return;
        addMsg(input.value, 'user');
        const text = input.value; input.value = "";
        document.getElementById('typing').style.display = 'block';

        try {
            const res = await fetch(API_URL, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
            });
            const data = await res.json();
            document.getElementById('typing').style.display = 'none';
            renderAI(data.candidates[0].content.parts[0].text);
        } catch(e) { document.getElementById('typing').style.display = 'none'; }
    }

    function renderAI(text) {
        const parts = text.split(/```(?:[a-z]*\n)?([\s\S]*?)```/g);
        const box = document.getElementById('chat-box');
        parts.forEach((p, i) => {
            if (i % 2 === 1) {
                const div = document.createElement('div'); div.className = 'code-block';
                div.innerHTML = `<div class="code-top"><span>CODE</span><button class="btn-run" onclick="run(this)">RUN</button></div><pre class="code-pre"></pre>`;
                div.querySelector('.code-pre').textContent = p.trim();
                box.appendChild(div);
            } else if (p.trim()) { addMsg(p.trim(), 'ai'); }
        });
        box.scrollTop = box.scrollHeight;
    }

    function addMsg(t, c) {
        const d = document.createElement('div'); d.className = `msg ${c}`; d.textContent = t;
        document.getElementById('chat-box').appendChild(d);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function run(btn) {
        const code = btn.parentElement.nextElementSibling.textContent;
        const blob = new Blob([code], { type: 'text/html' });
        window.open(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
