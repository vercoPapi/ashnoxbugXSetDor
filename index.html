<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Hacker - Code Generator & Chat 3D</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&family=Fira+Code:wght@400;600&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-green: #00ff41;
            --neon-yellow: #ffff00;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(10, 10, 20, 0.85);
            --glass-edge: rgba(0, 255, 255, 0.15);
            --ai-color: #00ffff;
            --user-color: #ff00ff;
            --font-main: 'Rajdhani', sans-serif;
            --font-display: 'Orbitron', monospace;
            --font-code: 'Fira Code', monospace;
        }

        body {
            font-family: var(--font-main);
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
            color: #fff;
        }

        /* ===== 3D BACKGROUND SCENE ===== */
        .scene-3d {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            transform-style: preserve-3d;
        }
        .scene-3d canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* scanlines overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.015) 2px,
                rgba(0, 255, 255, 0.015) 4px
            );
        }
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.85) 100%);
        }

        /* ===== MAIN CARD — 3D TRANSFORM ===== */
        .chat-wrapper {
            position: relative;
            z-index: 10;
            width: 580px;
            max-width: 94vw;
            height: 750px;
            max-height: 94vh;
            transform: rotateX(2deg) rotateY(-1deg) translateZ(30px);
            transform-style: preserve-3d;
            transition: transform 0.15s ease;
            border-radius: 24px;
        }
        .chat-wrapper:hover {
            transform: rotateX(0deg) rotateY(0deg) translateZ(40px);
        }

        .chat-card {
            width: 100%;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-edge);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow:
                0 0 40px rgba(0, 255, 255, 0.08),
                0 0 80px rgba(255, 0, 255, 0.04),
                inset 0 0 60px rgba(0, 255, 255, 0.02),
                0 20px 60px rgba(0, 0, 0, 0.6);
        }
        /* glowing edge */
        .chat-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            z-index: -1;
            background: conic-gradient(
                from 0deg,
                var(--neon-cyan),
                var(--neon-magenta),
                var(--neon-cyan),
                var(--neon-magenta),
                var(--neon-cyan)
            );
            opacity: 0.25;
            animation: borderGlow 6s linear infinite;
        }
        @keyframes borderGlow {
            0%   { filter: hue-rotate(0deg); opacity: 0.25; }
            50%  { opacity: 0.45; }
            100% { filter: hue-rotate(360deg); opacity: 0.25; }
        }

        /* ===== HEADER ===== */
        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.3);
        }
        .avatar-3d {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00ffff22, #ff00ff22);
            border: 1px solid rgba(0, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transform: rotateX(4deg) rotateY(-4deg) translateZ(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
            flex-shrink: 0;
        }
        .header-info h1 {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header-info .status {
            font-size: 12px;
            font-weight: 500;
            color: var(--neon-green);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-info .status .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulseDot 1.4s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.3; transform: scale(0.7); }
        }
        .header-badge {
            margin-left: auto;
            font-family: var(--font-code);
            font-size: 10px;
            color: rgba(0, 255, 255, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* ===== MESSAGE AREA ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
            opacity: 0.3;
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: msgIn 0.35s ease-out both;
            transform-style: preserve-3d;
        }
        @keyframes msgIn {
            0%   { opacity: 0; transform: translateY(18px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.ai {
            align-self: flex-start;
        }
        .message.user {
            align-self: flex-end;
        }

        .msg-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
            padding: 0 4px;
        }
        .message.ai .msg-label {
            color: var(--neon-cyan);
        }
        .message.user .msg-label {
            color: var(--neon-magenta);
            text-align: right;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            border: 1px solid transparent;
            transition: box-shadow 0.2s;
        }
        /* AI bubble — kiri */
        .message.ai .bubble {
            background: rgba(0, 255, 255, 0.06);
            border-color: rgba(0, 255, 255, 0.15);
            border-bottom-left-radius: 4px;
            color: #c8f0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.04);
        }
        .message.ai .bubble::before {
            content: '<';
            position: absolute;
            left: -10px;
            bottom: 6px;
            font-family: var(--font-code);
            font-size: 12px;
            color: rgba(0, 255, 255, 0.2);
        }
        /* User bubble — kanan */
        .message.user .bubble {
            background: rgba(255, 0, 255, 0.06);
            border-color: rgba(255, 0, 255, 0.15);
            border-bottom-right-radius: 4px;
            color: #ffd0f0;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.04);
        }
        .message.user .bubble::after {
            content: '/>';
            position: absolute;
            right: -10px;
            bottom: 6px;
            font-family: var(--font-code);
            font-size: 12px;
            color: rgba(255, 0, 255, 0.2);
        }

        .bubble .typing-dots {
            display: inline-flex;
            gap: 4px;
        }
        .bubble .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-cyan);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .bubble .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .bubble .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%,80%,100% { transform: translateY(0); opacity: 0.3; }
            40%         { transform: translateY(-8px); opacity: 1; }
        }

        /* code block styling */
        .bubble pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: var(--font-code);
            font-size: 12px;
            line-height: 1.5;
            overflow-x: auto;
            margin: 6px 0;
            color: #8cf;
            white-space: pre-wrap;
        }
        .bubble pre .kw { color: #ff79c6; }
        .bubble pre .str { color: #f1fa8c; }
        .bubble pre .cm { color: #6272a4; font-style: italic; }
        .bubble pre .fn { color: #50fa7b; }
        .bubble pre .num { color: #bd93f9; }
        .bubble pre .tag { color: #ff79c6; }
        .bubble pre .attr { color: #50fa7b; }
        .bubble pre .val { color: #f1fa8c; }

        .bubble .copy-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 12px;
            font-family: var(--font-code);
            font-size: 10px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 6px;
            color: var(--neon-cyan);
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.5px;
        }
        .bubble .copy-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.05);
        }
        .bubble .copy-btn.copied {
            color: var(--neon-green);
            border-color: rgba(0, 255, 65, 0.3);
        }

        /* ===== INPUT AREA ===== */
        .chat-input-area {
            padding: 12px 18px 16px;
            border-top: 1px solid rgba(0, 255, 255, 0.08);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.2);
        }
        .chat-input-area textarea {
            flex: 1;
            background: rgba(0, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.12);
            border-radius: 14px;
            padding: 10px 16px;
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 500;
            color: #e0f0ff;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 100px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .chat-input-area textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 24px rgba(0, 255, 255, 0.06);
        }
        .chat-input-area textarea::placeholder {
            color: rgba(0, 255, 255, 0.2);
            font-weight: 400;
        }

        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            background: rgba(0, 255, 255, 0.06);
            color: var(--neon-cyan);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            transform: translateZ(5px);
        }
        .btn-send:hover {
            background: rgba(0, 255, 255, 0.12);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            transform: translateZ(8px) scale(1.04);
        }
        .btn-send:active {
            transform: translateZ(0) scale(0.94);
        }

        /* ===== responsive ===== */
        @media (max-width: 540px) {
            .chat-wrapper {
                max-width: 100vw;
                max-height: 100vh;
                border-radius: 0;
                transform: none !important;
            }
            .chat-card {
                border-radius: 0;
            }
            .chat-card::before { border-radius: 0; }
            .chat-messages { padding: 12px; }
            .message { max-width: 92%; }
            .bubble { font-size: 13px; }
            .bubble pre { font-size: 11px; }
        }
    </style>
</head>
<body>

<!-- ===== 3D SCENE (pure canvas particle system) ===== -->
<div class="scene-3d" id="scene3d"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- ===== CHAT UI ===== -->
<div class="chat-wrapper" id="chatWrapper">
    <div class="chat-card">

        <!-- HEADER -->
        <div class="chat-header">
            <div class="avatar-3d">&#x1F916;</div>

                <h1>AI Hacker</h1>
                <span class="status"><span class="dot"></span> ONLINE &mdash; v4.2</span>
            </div>

        <!-- MESSAGES -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- INPUT -->
        <div class="chat-input-area">
            <textarea id="chatInput" rows="1" placeholder="Ketik pesan / minta kode... contoh: 'buatkan html button keren'"></textarea>
            <button class="btn-send" id="btnSend" title="Kirim">&#x27A4;</button>
        </div>

    </div>
</div>

<script>
    // ============================================================
    //  1. THREE.JS-LIKE 3D PARTICLE BACKGROUND (Pure Canvas)
    // ============================================================
    (function init3DScene() {
        const container = document.getElementById('scene3d');
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const STAR_COUNT = 300;
        const stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                z: Math.random() * 300 + 50,
                size: Math.random() * 2.4 + 0.4,
                speed: Math.random() * 0.5 + 0.1,
                hue: Math.random() > 0.6 ? (Math.random() > 0.5 ? 180 : 300) : 0,
            });
        }

        let lines = [];
        function buildLines() {
            lines = [];
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    const dx = stars[i].x - stars[j].x;
                    const dy = stars[i].y - stars[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120 && Math.random() < 0.12) {
                        lines.push({ a: i, b: j, maxDist: 120 });
                    }
                }
            }
        }
        buildLines();

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', e => {
            mouseX = (e.clientX / W - 0.5) * 0.6;
            mouseY = (e.clientY / H - 0.5) * 0.6;
        });

        let time = 0;
        function draw() {
            time += 0.004;
            ctx.fillStyle = 'rgba(10,10,15,1)';
            ctx.fillRect(0, 0, W, H);

            const offsetX = mouseX * 30;
            const offsetY = mouseY * 30;

            for (const s of stars) {
                s.x += Math.sin(time + s.z * 0.01) * 0.08;
                s.y += Math.cos(time * 0.7 + s.z * 0.008) * 0.06;
                if (s.x < -50) s.x = W + 50;
                if (s.x > W + 50) s.x = -50;
                if (s.y < -50) s.y = H + 50;
                if (s.y > H + 50) s.y = -50;
                s.z += Math.sin(time * 0.5 + s.x * 0.001) * 0.08;
                if (s.z < 30) s.z = 30;
                if (s.z > 400) s.z = 400;
            }

            const sorted = [...stars].sort((a, b) => a.z - b.z);

            ctx.lineWidth = 0.5;
            for (const ln of lines) {
                const sa = stars[ln.a];
                const sb = stars[ln.b];
                const dx = sa.x - sb.x;
                const dy = sa.y - sb.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > ln.maxDist) continue;
                const alpha = (1 - dist / ln.maxDist) * 0.15;
                ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
                ctx.beginPath();
                ctx.moveTo(sa.x + offsetX * (sa.z / 300), sa.y + offsetY * (sa.z / 300));
                ctx.lineTo(sb.x + offsetX * (sb.z / 300), sb.y + offsetY * (sb.z / 300));
                ctx.stroke();
            }

            for (const s of sorted) {
                const px = s.x + offsetX * (s.z / 300);
                const py = s.y + offsetY * (s.z / 300);
                const scale = 0.7 + (s.z / 400) * 0.6;
                const size = s.size * scale;
                let color;
                if (s.hue === 180) color = `rgba(0,255,255,${0.4 + scale * 0.5})`;
                else if (s.hue === 300) color = `rgba(255,0,255,${0.3 + scale * 0.4})`;
                else color = `rgba(180,200,255,${0.2 + scale * 0.3})`;
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                if (size > 0.8) {
                    ctx.beginPath();
                    ctx.arc(px, py, size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = s.hue === 180
                        ? `rgba(0,255,255,${0.03 * scale})`
                        : s.hue === 300
                        ? `rgba(255,0,255,${0.02 * scale})`
                        : `rgba(100,150,255,${0.01})`;
                    ctx.fill();
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();


    // ============================================================
    //  2. OTAK AI — Enhanced with CODE GENERATOR

                    }

                        return `<!DOCTYPE html>

            help: ['Gue siap bantu! Coba tanya spesifik: **hacking, coding (minta gue buatin kode!), jaringan, linux, tools, kripto, atau security**?','Butuh bantuan? Mention topik lo: **"buatkan html login"**, **"bikin python scanner"**, **SQLi? XSS?** Gas aja!','Gue **AI Hacker** — bilang aja butuh apa. **Minta kode?** Tinggal bilang "buatkan [bahasa] [fungsi]" 😁'],
            identity: ['**Ethical Hacker** = punya izin, **Black Hat** = kriminal, **Gray Hat** = abu-abu. Lo tim mana?','Gue dibikin buat **ethical hacking & security assessment**. Bukan buat crime ya!','Hacker itu mindset, bukan tools. Lo bisa jadi hacker kalo lo paham sistem sampe akar.'],
            default: ['Hmm, menarik. Gue **AI Hacker**, asisten cybersecurity & **code generator**. Coba bilang: "buatkan html button" atau "bikin python script" 🚀','Gue denger lo. Tapi gue butuh konteks lebih. **Mau gue buatin kode?** Sebutin bahasa & fungsinya!','**AI Hacker** receive. Coba: "buatkan [html/js/python/php/sql] [fungsi]". Contoh: "buatkan html form login"','Gue paham sebagian. Tapi makin spesifik lo, makin mantul jawaban gue. **Minta kode?** Tinggal bilang!','Wah, di luar database gue nih. Tapi kalo lo butuh **dibikinin kode**, gue siap! Coba sebutin spesifikasinya.']
        };

        // ---- Helpers ----
        function normalize(text) {
            return text.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
        }

        function matchCategory(input) {
            const norm = normalize(input);
            let bestCat = null, bestScore = 0;
            for (const [cat, keywords] of Object.entries(knowledge)) {
                let score = 0;
                for (const kw of keywords) {
                    const nkw = normalize(kw);
                    if (norm.includes(nkw)) score += nkw.length;
                    const words = norm.split(' ');
                    for (const w of words) {
                        if (w === nkw || (nkw.length > 3 && w.includes(nkw))) score += 3;
                        if (nkw.includes(w) && w.length > 2) score += 1;
                    }
                }
                if (score > bestScore) { bestScore = score; bestCat = cat; }
            }
            return bestCat;
        }

        function getResponse(category) {
            const arr = responses[category] || responses.default;
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // ---- Detect code generation request ----
        function detectCodeRequest(input) {
            const lower = input.toLowerCase().trim();

            // Specific: "buatkan kode html ..." or similar
            for (const [lang, gen] of Object.entries(codeGenerators)) {
                for (const d of gen.detect) {
                    if (lower.includes(d)) {
                        return { lang, generator: gen };
                    }
                }
            }

            // Check patterns like "buatkan html", "bikin js", "kode python", etc.
            const langMap = {
                'html': 'html', 'htm': 'html', 'halaman': 'html', 'web': 'html',
                'css': 'css', 'style': 'css',
                'js': 'javascript', 'javascript': 'javascript', 'node': 'javascript',
                'python': 'python', 'py': 'python',
                'php': 'php',
                'sql': 'sql', 'query': 'sql', 'database': 'sql', 'mysql': 'sql',
            };
            for (const [word, lang] of Object.entries(langMap)) {
                if (lower.includes(word) && (lower.includes('bikin') || lower.includes('buat') || lower.includes('buatkan') || lower.includes('generate') || lower.includes('kode') || lower.includes('coding') || lower.includes('code') || lower.includes('script') || lower.includes('program') || lower.includes('tolong'))) {
                    // find exact generator
                    for (const [key, gen] of Object.entries(codeGenerators)) {
                        if (key === lang || gen.label.toLowerCase() === lang.toLowerCase()) {
                            return { lang: key, generator: gen };
                        }
                    }
                }
            }

            // If user says "kode" or "code" without specific language, prompt
            if (lower.includes('kode') || lower.includes('code') || lower.includes('coding') || lower.includes('program')) {
                // but we need to know what language - return general
                return { lang: 'general', generator: codeGenerators.general };
            }

            return null;
        }

        // ---- Special command handler ----
        function handleSpecial(input) {
            const t = input.trim().toLowerCase();

            // Calculator
            const calcMatch = t.match(/^hitung\s+([\d\s\+\-\*\/\(\)\.]+)$/);
            if (calcMatch) {
                try {
                    const expr = calcMatch[1].replace(/[^0-9+\-*/().\s]/g, '');
                    if (expr) {
                        const result = Function('"use strict"; return (' + expr + ')')();
                        return `Hasil: **${result}** 🧮`;
                    }
                } catch (_) {
                    return 'Ekspresi matematika nggak valid. Coba: `hitung 2 + 2 * 3`';
                }
            }

            if (t.startsWith('/help') || t === 'help') {
                return [
                    '```',
                    '  AI Hacker v4.2 — Command List',
                    '  ─────────────────────────────────',
                    '  /help         — Tampilkan ini',
                    '  /clear        — Bersihkan chat',
                    '  /about        — Info AI Hacker',
                    '  hitung [expr] — Kalkulator',
                    '',
                    '  ✨ CODE GENERATOR ✨',
                    '  "buatkan html [button/form/table/navbar]"',
                    '  "bikin css [button/card/animation]"',
                    '  "buat js [function/api/validation]"',
                    '  "bikin python [scanner/hash]"',
                    '  "buat sql [select/insert/create]"',
                    '  "kode php", "buatkan program"',
                    '  ─────────────────────────────────',
                    '  Topik: hacking, coding, linux,',
                    '  jaringan, crypto, tools, dll.',
                    '```'
                ].join('\n');
            }

            if (t.startsWith('/clear')) return '__CLEAR__';

            if (t.startsWith('/about') || t === 'about') {
                return [
                    '```',
                    '  ╔══════════════════════════════╗',
                    '  ║     AI Hacker  v4.2          ║',
                    '  ║  Self-contained JS AI        ║',
                    '  ║  + Code Generator Engine     ║',
                    '  ║  No external API needed      ║',
                    '  ║  Supports: HTML, CSS, JS,    ║',
                    '  ║  Python, PHP, SQL            ║',
                    '  ║  Created with ❤️ by          ║',
                    '  ║  a cybersecurity dev         ║',
                    '  ╚══════════════════════════════╝',
                    '```'
                ].join('\n');
            }

            return null;
        }

        // ---- Public API ----
        function think(input) {
            if (!input || input.trim().length === 0) return 'Ket sesuatu dong, masa diam aja 😅';

            // Check special commands first
            const special = handleSpecial(input);
            if (special === '__CLEAR__') return '__CLEAR__';
            if (special !== null) return special;

            // Check if this is a code generation request
            const codeReq = detectCodeRequest(input);
            if (codeReq) {
                const code = codeReq.generator.generate(input);
                const langLabel = codeReq.generator.label;
                // Wrap code in a nice format
                return `**${langLabel} Code Generated** 👇\n\n\`\`\`\n${code}\n\`\`\`\n\n_Gas aja! Mau coba bahasa lain?_`;
            }

            // Match category for chat
            const category = matchCategory(input);
            if (category) {
                return getResponse(category);
            }

            // Fallback
            const norm = normalize(input);
            if (norm.endsWith('?')) {
                return 'Pertanyaan bagus! Tapi gue butuh konteks lebih. Coba tanya spesifik soal **cybersecurity, programming, networking**, atau **minta dibuatkan kode**!';
            }

            return getResponse('default');
        }

        return { think };
    })();


    // ============================================================
    //  3. CHAT CONTROLLER
    // ============================================================
    (function initChat() {
        const messagesEl = document.getElementById('chatMessages');
        const inputEl = document.getElementById('chatInput');
        const btnSend = document.getElementById('btnSend');

        function scrollDown() {
            setTimeout(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 30);
        }

        function formatText(text) {
            // Process code blocks first
            let html = text.replace(/```([\s\S]*?)```/g, (match, codeContent) => {
                // Escape HTML in code
                const escaped = codeContent
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                // Generate a unique ID for copy button
                const id = 'code_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                return `<pre id="${id}">${escaped}</pre><button class="copy-btn" data-target="${id}" onclick="copyCode('${id}')">[ COPY ]</button>`;
            });
            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--neon-cyan);">$1</strong>');
            // Italic
            html = html.replace(/_(.*?)_/g, '<em style="color:rgba(255,255,255,0.6);">$1</em>');
            // Newlines
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = role === 'ai' ? 'AI HACKER' : 'KAMU';
            div.appendChild(label);

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (role === 'ai' && text === '__TYPING__') {
                const dots = document.createElement('span');
                dots.className = 'typing-dots';
                dots.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(dots);
            } else {
                bubble.innerHTML = formatText(text);
            }

            div.appendChild(bubble);
            messagesEl.appendChild(div);
            scrollDown();
            return div;
        }

        function removeTyping() {
            const msgs = messagesEl.querySelectorAll('.message.ai');
            if (msgs.length > 0) {
                const last = msgs[msgs.length - 1];
                if (last.querySelector('.typing-dots')) {
                    last.remove();
                }
            }
        }

        function respond(userText) {
            addMessage('ai', '__TYPING__');

            const delay = Math.min(500 + userText.length * 8, 1800);

            setTimeout(() => {
                removeTyping();
                const answer = AIBrain.think(userText);

                if (answer === '__CLEAR__') {
                    messagesEl.innerHTML = '';
                    setTimeout(() => {
                        addMessage('ai', 'Chat dibersihkan! Siap-siap lagi 🔄');
                    }, 50);
                    return;
                }

                addMessage('ai', answer);
            }, delay);
        }

        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage('user', text);
            inputEl.value = '';
            inputEl.style.height = 'auto';
            respond(text);
        }

        // Events
        btnSend.addEventListener('click', sendMessage);

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
        });

        // Welcome
        setTimeout(() => {
            addMessage('ai', 'Halo! Gue **AI Hacker** v4.2 🤖 asisten cybersecurity + **Code Generator**!\n\nKetik `/help` buat lihat command, atau langsung:\n👉 "buatkan **html** button keren"\n👉 "bikin **python** port scanner"\n👉 "buat **sql** create table"');
        }, 600);

        // ---- 3D mouse tracking ----
        const wrapper = document.getElementById('chatWrapper');
        document.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = (e.clientX - cx) / rect.width;
            const dy = (e.clientY - cy) / rect.height;
            const rotateY = dx * 4;
            const rotateX = -dy * 4;
            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(30px)`;
        });
        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = 'rotateX(2deg) rotateY(-1deg) translateZ(30px)';
        });
    })();

    // ---- Global copy function ----
    window.copyCode = function(elementId) {
        const pre = document.getElementById(elementId);
        if (!pre) return;
        const code = pre.textContent;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(`[data-target="${elementId}"]`);
                if (btn) {
                    btn.textContent = '[ COPIED! ]';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '[ COPY ]';
                        btn.classList.remove('copied');
                    }, 2000);
                }
            }).catch(() => fallbackCopy(code, elementId));
        } else {
            fallbackCopy(code, elementId);
        }
    };

    function fallbackCopy(text, elementId) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            const btn = document.querySelector(`[data-target="${elementId}"]`);
            if (btn) {
                btn.textContent = '[ COPIED! ]';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '[ COPY ]';
                    btn.classList.remove('copied');
                }, 2000);
            }
        } catch (e) {
            // ignore
        }
        document.body.removeChild(textarea);
    }
</script>
