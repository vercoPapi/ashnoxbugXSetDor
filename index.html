<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Hacker Neural v5 — Online Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&family=Fira+Code:wght@400;600&display=swap');

        :root {
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --green: #00ff41;
            --yellow: #ffff00;
            --dark: #0a0a0f;
            --panel: rgba(10,10,20,0.88);
            --glass: rgba(0,255,255,0.12);
            --font: 'Rajdhani', sans-serif;
            --display: 'Orbitron', monospace;
            --code: 'Fira Code', monospace;
        }
        body {
            font-family: var(--font);
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
            color: #fff;
        }

        /* 3D Scene */
        .scene-3d { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .scene-3d canvas { display: block; width: 100%; height: 100%; }
        .scanlines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.012) 2px, rgba(0,255,255,0.012) 4px);
        }
        .vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.88) 100%);
        }

        /* Chat Card 3D */
        .chat-wrapper {
            position: relative; z-index: 10;
            width: 600px; max-width: 95vw;
            height: 780px; max-height: 95vh;
            transform: rotateX(2deg) rotateY(-1deg) translateZ(30px);
            transform-style: preserve-3d;
            transition: transform 0.12s ease;
            border-radius: 24px;
        }
        .chat-card {
            width: 100%; height: 100%;
            background: var(--panel);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass);
            border-radius: 24px;
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
            box-shadow: 0 0 40px rgba(0,255,255,0.06), 0 0 80px rgba(255,0,255,0.03), inset 0 0 60px rgba(0,255,255,0.015), 0 20px 60px rgba(0,0,0,0.6);
        }
        .chat-card::before {
            content: ''; position: absolute; inset: -2px; border-radius: 26px; z-index: -1;
            background: conic-gradient(from 0deg, var(--cyan), var(--magenta), var(--cyan), var(--magenta), var(--cyan));
            opacity: 0.2; animation: borderGlow 6s linear infinite;
        }
        @keyframes borderGlow {
            0% { filter: hue-rotate(0deg); opacity: 0.2; }
            50% { opacity: 0.4; }
            100% { filter: hue-rotate(360deg); opacity: 0.2; }
        }

        /* Header */
        .chat-header {
            padding: 12px 18px;
            border-bottom: 1px solid rgba(0,255,255,0.1);
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; background: rgba(0,0,0,0.25);
        }
        .avatar-3d {
            width: 42px; height: 42px; border-radius: 12px;
            background: linear-gradient(135deg, #00ffff18, #ff00ff18);
            border: 1px solid rgba(0,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transform: rotateX(4deg) rotateY(-4deg) translateZ(8px);
            box-shadow: 0 0 20px rgba(0,255,255,0.08); flex-shrink: 0;
        }
        .header-info h1 {
            font-family: var(--display); font-size: 15px; font-weight: 700;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .header-info .status {
            font-size: 11px; font-weight: 500; color: var(--green);
            display: flex; align-items: center; gap: 6px;
        }
        .header-info .status .dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 8px var(--green);
            animation: pulseDot 1.4s ease-in-out infinite;
        }
        @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
        .header-badge {
            margin-left: auto; font-family: var(--code); font-size: 9px;
            color: rgba(0,255,255,0.35); border: 1px solid rgba(0,255,255,0.08);
            padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; white-space: nowrap;
        }
        .lang-indicator {
            font-family: var(--code); font-size: 10px;
            padding: 3px 10px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,255,0.06);
            color: var(--cyan); margin-left: 6px; letter-spacing: 0.5px;
        }

        /* Messages */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 14px 16px;
            display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; opacity: 0.2; }

        .message { display: flex; flex-direction: column; max-width: 92%; animation: msgIn .3s ease-out both; }
        @keyframes msgIn { 0%{opacity:0;transform:translateY(14px)scale(.95)} 100%{opacity:1;transform:translateY(0)scale(1)} }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; }

        .msg-label { font-size: 9px; font-weight: 600; letter-spacing: .8px; margin-bottom: 3px; padding: 0 4px; }
        .message.ai .msg-label { color: var(--cyan); }
        .message.user .msg-label { color: var(--magenta); text-align: right; }

        .bubble {
            padding: 10px 15px; border-radius: 14px; font-size: 14px; line-height: 1.5;
            word-wrap: break-word; position: relative; border: 1px solid transparent;
        }
        .message.ai .bubble {
            background: rgba(0,255,255,0.05); border-color: rgba(0,255,255,0.12);
            border-bottom-left-radius: 3px; color: #c8f0ff;
        }
        .message.ai .bubble::before {
            content: '<'; position: absolute; left: -9px; bottom: 5px;
            font-family: var(--code); font-size: 11px; color: rgba(0,255,255,0.15);
        }
        .message.user .bubble {
            background: rgba(255,0,255,0.05); border-color: rgba(255,0,255,0.12);
            border-bottom-right-radius: 3px; color: #ffd0f0;
        }
        .message.user .bubble::after {
            content: '/>'; position: absolute; right: -9px; bottom: 5px;
            font-family: var(--code); font-size: 11px; color: rgba(255,0,255,0.15);
        }

        .bubble .typing-dots { display: inline-flex; gap: 4px; }
        .bubble .typing-dots span {
            width: 5px; height: 5px; border-radius: 50%; background: var(--cyan);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .bubble .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .bubble .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes dotBounce { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-7px);opacity:1} }

        /* Code blocks in bubbles */
        .bubble pre {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,255,0.07);
            border-radius: 8px; padding: 10px 12px;
            font-family: var(--code); font-size: 11px; line-height: 1.5;
            overflow-x: auto; margin: 5px 0; color: #8cf; white-space: pre-wrap;
        }
        .bubble .search-result {
            background: rgba(0,255,255,0.03); border: 1px solid rgba(0,255,255,0.06);
            border-radius: 8px; padding: 8px 12px; margin: 4px 0;
            font-size: 12px; line-height: 1.4;
        }
        .bubble .search-result a {
            color: var(--cyan); text-decoration: underline; text-decoration-color: rgba(0,255,255,0.3);
        }
        .bubble .sr-title { color: var(--cyan); font-weight: 600; }
        .bubble .sr-snippet { color: rgba(255,255,255,0.55); font-size: 11px; }
        .bubble .sr-url { color: var(--green); font-size: 10px; font-family: var(--code); }

        .copy-btn {
            display: inline-block; margin-top: 4px; padding: 2px 10px;
            font-family: var(--code); font-size: 9px;
            background: rgba(0,255,255,0.06); border: 1px solid rgba(0,255,255,0.1);
            border-radius: 5px; color: var(--cyan); cursor: pointer;
            transition: all .15s; letter-spacing: .5px;
        }
        .copy-btn:hover { background: rgba(0,255,255,0.12); }
        .copy-btn.copied { color: var(--green); border-color: rgba(0,255,65,0.25); }

        /* Search notice */
        .search-notice {
            font-size: 10px; color: rgba(0,255,255,0.2);
            font-family: var(--code); margin-top: 2px;
            display: flex; align-items: center; gap: 4px;
        }
        .search-notice .spinner {
            display: inline-block; width: 8px; height: 8px;
            border: 1px solid rgba(0,255,255,0.2); border-radius: 50%;
            border-top-color: var(--cyan); animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Input */
        .chat-input-area {
            padding: 10px 16px 14px;
            border-top: 1px solid rgba(0,255,255,0.06);
            display: flex; gap: 8px; align-items: flex-end;
            flex-shrink: 0; background: rgba(0,0,0,0.15);
        }
        .chat-input-area textarea {
            flex: 1;
            background: rgba(0,255,255,0.02);
            border: 1px solid rgba(0,255,255,0.1);
            border-radius: 12px; padding: 10px 14px;
            font-family: var(--font); font-size: 14px; font-weight: 500;
            color: #e0f0ff; resize: none; outline: none;
            min-height: 40px; max-height: 90px;
            transition: border-color .2s, box-shadow .2s;
        }
        .chat-input-area textarea:focus {
            border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,255,255,0.04);
        }
        .chat-input-area textarea::placeholder {
            color: rgba(0,255,255,0.15); font-weight: 400;
        }
        .btn-send {
            width: 44px; height: 44px; border-radius: 12px;
            border: 1px solid rgba(0,255,255,0.15);
            background: rgba(0,255,255,0.05); color: var(--cyan);
            font-size: 18px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all .2s; flex-shrink: 0; transform: translateZ(3px);
        }
        .btn-send:hover {
            background: rgba(0,255,255,0.1); border-color: var(--cyan);
            box-shadow: 0 0 24px rgba(0,255,255,0.06);
            transform: translateZ(6px) scale(1.03);
        }
        .btn-send:active { transform: translateZ(0) scale(.93); }

        /* Info bar */
        .info-bar {
            padding: 4px 18px; font-size: 9px; color: rgba(0,255,255,0.15);
            font-family: var(--code); display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.1); border-top: 1px solid rgba(0,255,255,0.03);
            flex-shrink: 0; letter-spacing: .3px;
        }
        .info-bar .online-status { color: var(--green); opacity: 0.4; }

        @media (max-width: 540px) {
            .chat-wrapper { max-width: 100vw; max-height: 100vh; border-radius: 0; transform: none !important; }
            .chat-card { border-radius: 0; }
            .chat-card::before { border-radius: 0; }
            .chat-messages { padding: 10px; }
            .message { max-width: 95%; }
            .bubble { font-size: 13px; }
            .bubble pre { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="scene-3d" id="scene3d"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="chat-wrapper" id="chatWrapper">
    <div class="chat-card">
        <div class="chat-header">
            <div class="avatar-3d">🧠</div>
            <div class="header-info">
                <h1>AI Hacker Neural</h1>
                <span class="status"><span class="dot"></span> ONLINE · <span id="langLabel">🌐 multi</span></span>
            </div>
            <div class="header-badge">v5.0 NEURAL</div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <textarea id="chatInput" rows="1" placeholder="Ketik pesan... cari: [kata kunci], buka: [url], buatkan [kode]..."></textarea>
            <button class="btn-send" id="btnSend" title="Kirim">➤</button>
        </div>
        <div class="info-bar">
            <span>🧠 NEURAL ENGINE</span>
            <span class="online-status">⬡ ONLINE · DUCKDUCKGO · WIKIPEDIA</span>
        </div>
    </div>
</div>

<script>
    // ====================================================================
    //  1. 3D BACKGROUND (Canvas Particle System)
    // ====================================================================
    (function init3D() {
        const c = document.getElementById('scene3d'), cv = document.createElement('canvas');
        c.appendChild(cv); const ctx = cv.getContext('2d');
        let W, H;
        const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
        resize(); addEventListener('resize', resize);
        const stars = Array.from({ length: 320 }, () => ({
            x: Math.random() * W, y: Math.random() * H, z: Math.random() * 300 + 50,
            s: Math.random() * 2.2 + .3, sp: Math.random() * .5 + .1,
            h: Math.random() > .6 ? (Math.random() > .5 ? 180 : 300) : 0
        }));
        let lines = [];
        (function build() {
            lines = [];
            for (let i = 0; i < stars.length; i++)
                for (let j = i + 1; j < stars.length; j++) {
                    const dx = stars[i].x - stars[j].x, dy = stars[i].y - stars[j].y;
                    if (Math.sqrt(dx * dx + dy * dy) < 110 && Math.random() < .1) lines.push({ a: i, b: j, md: 110 });
                }
        })();
        let mx = 0, my = 0, tm = 0;
        addEventListener('mousemove', e => { mx = (e.clientX / W - .5) * .5; my = (e.clientY / H - .5) * .5; });
        (function draw() {
            tm += .0035;
            ctx.fillStyle = 'rgba(10,10,15,1)'; ctx.fillRect(0, 0, W, H);
            const ox = mx * 25, oy = my * 25;
            for (const s of stars) {
                s.x += Math.sin(tm + s.z * .01) * .07;
                s.y += Math.cos(tm * .7 + s.z * .008) * .05;
                if (s.x < -40) s.x = W + 40; if (s.x > W + 40) s.x = -40;
                if (s.y < -40) s.y = H + 40; if (s.y > H + 40) s.y = -40;
                s.z += Math.sin(tm * .5 + s.x * .001) * .07;
                if (s.z < 30) s.z = 30; if (s.z > 400) s.z = 400;
            }
            const sorted = [...stars].sort((a, b) => a.z - b.z);
            ctx.lineWidth = .4;
            for (const l of lines) {
                const a = stars[l.a], b = stars[l.b];
                const dx = a.x - b.x, dy = a.y - b.y, d = Math.sqrt(dx * dx + dy * dy);
                if (d > l.md) continue;
                const al = (1 - d / l.md) * .1;
                ctx.strokeStyle = `rgba(0,255,255,${al})`;
                ctx.beginPath();
                ctx.moveTo(a.x + ox * (a.z / 300), a.y + oy * (a.z / 300));
                ctx.lineTo(b.x + ox * (b.z / 300), b.y + oy * (b.z / 300));
                ctx.stroke();
            }
            for (const s of sorted) {
                const px = s.x + ox * (s.z / 300), py = s.y + oy * (s.z / 300);
                const sc = .7 + (s.z / 400) * .6, sz = s.s * sc;
                const c2 = s.h === 180 ? `rgba(0,255,255,${.3 + sc * .5})` : s.h === 300 ? `rgba(255,0,255,${.2 + sc * .4})` : `rgba(150,180,255,${.15 + sc * .3})`;
                ctx.beginPath(); ctx.arc(px, py, sz, 0, Math.PI * 2); ctx.fillStyle = c2; ctx.fill();
                if (sz > .7) { ctx.beginPath(); ctx.arc(px, py, sz * 3, 0, Math.PI * 2); ctx.fillStyle = s.h === 180 ? `rgba(0,255,255,${.02 * sc})` : s.h === 300 ? `rgba(255,0,255,${.012 * sc})` : `rgba(80,120,255,${.005})`; ctx.fill(); }
            }
            requestAnimationFrame(draw);
        })();
    })();

    // ====================================================================
    //  2. LANGUAGE DETECTOR
    // ====================================================================
    const LangDetector = {
        detect(text) {
            if (!text || !text.trim()) return 'en';
            const t = text.trim();
            // Script-based detection
            if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(t)) return 'zh';
            if (/[\u3040-\u309f]/.test(t)) return 'ja';
            if (/[\u30a0-\u30ff\u30f0-\u30ff]/.test(t)) return 'ja';
            if (/[\uac00-\ud7af]/.test(t)) return 'ko';
            if (/[\u0600-\u06ff]/.test(t)) return 'ar';
            if (/[\u0400-\u04ff]/.test(t)) return 'ru';
            if (/[\u0e00-\u0e7f]/.test(t)) return 'th';
            if (/[\u0900-\u097f]/.test(t)) return 'hi';
            // Latin-based — compare common words
            const words = t.toLowerCase().match(/[a-z]+/g) || [];
            const idWords = ['yang','dan','di','dengan','untuk','tidak','ini','dari','akan','dapat','bisa','saya','kita','mereka','ada','telah','sudah','atau','karena','juga','ke','oleh','pada','sebagai','dalam','itu','saat','kalau','saja','saya','dia','kami','aku','bukan','ya','tolong','bantu','buat','bikin','cari','lihat','mana','apa','kenapa','bagaimana','kapan','siapa'];
            const enWords = ['the','and','for','are','but','not','you','all','any','can','had','her','was','one','our','out','has','have','been','some','them','than','that','this','very','what','when','which','who','will','with','your','please','help','search','find','look','make','create','code','want','need','tell','about','would','could','should'];
            const esWords = ['el','la','los','las','que','y','en','un','una','por','con','para','como','más','pero','sus','son','era','han','está','ser','haber','tener','hacer','poder','decir','entre','todo','también','donde','quien','cual'];
            const frWords = ['le','la','les','de','du','des','et','en','un','une','pour','avec','dans','sur','que','qui','pas','nous','vous','ils','elles','est','sont','ont','fait','faire','être','avoir','pouvoir','vouloir','dire','aussi','mais','ou','où','comment','pourquoi'];
            const deWords = ['der','die','das','und','in','den','von','zu','mit','auf','für','ist','sind','war','hat','haben','sein','werden','können','müssen','sagen','auch','noch','aus','bei','nach','um','nicht','aber','oder','wie','was','wer','wo','wann','warum'];
            const ptWords = ['o','a','os','as','de','da','do','em','para','com','um','uma','por','mais','mas','foi','são','tem','ter','seu','sua','como','entre','todo','também','onde','quem','qual','porque','poder','fazer'];

            const count = (list) => words.filter(w => list.includes(w)).length;
            const scores = {
                id: count(idWords), en: count(enWords), es: count(esWords),
                fr: count(frWords), de: count(deWords), pt: count(ptWords)
            };
            let best = 'en', bestScore = 0;
            for (const [lang, score] of Object.entries(scores)) {
                if (score > bestScore) { bestScore = score; best = lang; }
            }
            if (bestScore < 2) {
                // Try shorter word match
                for (const w of words) {
                    if (w.length > 2) {
                        if (idWords.includes(w)) { scores.id += 2; }
                        if (enWords.includes(w)) { scores.en += 2; }
                    }
                }
                best = 'en'; bestScore = 0;
                for (const [lang, score] of Object.entries(scores)) {
                    if (score > bestScore) { bestScore = score; best = lang; }
                }
            }
            return bestScore === 0 ? 'en' : best;
        },

        getName(code) {
            const map = {
                id: '🇮🇩 Indonesia', en: '🇬🇧 English', zh: '🇨🇳 中文', ja: '🇯🇵 日本語',
                ko: '🇰🇷 한국어', ar: '🇸🇦 العربية', ru: '🇷🇺 Русский', th: '🇹🇭 ไทย',
                hi: '🇮🇳 हिन्दी', es: '🇪🇸 Español', fr: '🇫🇷 Français',
                de: '🇩🇪 Deutsch', pt: '🇧🇷 Português'
            };
            return map[code] || `🌐 ${code.toUpperCase()}`;
        }
    };

    // ====================================================================
    //  3. ONLINE ENGINE — DuckDuckGo + Wikipedia + URL Fetcher
    // ====================================================================
    const OnlineEngine = {
        // Search DuckDuckGo instant answer
        async searchDDG(query) {
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1&t=ai_hacker`;
                const r = await fetch(url);
                const data = await r.json();
                let results = [];
                // Abstract/instant answer
                if (data.AbstractText) {
                    results.push({ type: 'answer', title: data.Heading || 'Ringkasan', text: data.AbstractText, url: data.AbstractURL });
                }
                if (data.Answer) {
                    results.push({ type: 'answer', title: 'Jawaban', text: data.Answer });
                }
                if (data.Definition) {
                    results.push({ type: 'definition', title: 'Definisi', text: data.Definition, url: data.DefinitionURL });
                }
                // Related topics
                if (data.RelatedTopics && data.RelatedTopics.length) {
                    for (const topic of data.RelatedTopics.slice(0, 6)) {
                        if (topic.Text) {
                            results.push({ type: 'related', title: topic.Text.split(' - ')[0] || topic.Text, text: topic.Text, url: topic.FirstURL });
                        } else if (topic.Topics) {
                            for (const sub of topic.Topics.slice(0, 3)) {
                                if (sub.Text) results.push({ type: 'related', title: sub.Text.split(' - ')[0] || sub.Text, text: sub.Text, url: sub.FirstURL });
                            }
                        }
                    }
                }
                // Results array
                if (data.Results && data.Results.length) {
                    for (const res of data.Results.slice(0, 4)) {
                        results.push({ type: 'result', title: res.Text || res.FirstURL, text: res.Text, url: res.FirstURL });
                    }
                }
                return results.length ? results : null;
            } catch (e) {
                console.warn('DDG search error:', e);
                return null;
            }
        },

        // Search Wikipedia

            if (intent.type === 'search') {
                const q = intent.query;
                return { special: 'search', query: q, lang };
            }

            // ===== FETCH URL =====
            if (intent.type === 'fetch') {
                return { special: 'fetch', url: intent.url, lang };
            }

            // ===== CODE GENERATION =====
            if (intent.type === 'code') {
                const codeRes = generateCode(intent.language, input);
                return `**${intent.language.toUpperCase()} Code — AI Hacker Neural** 👇\n\n\`\`\`\n${codeRes}\n\`\`\`\n\n_Gas! Mau coba bahasa lain?_`;
            }

            // ===== CHAT / FALLBACK =====
            // Check if it's a general question that might benefit from search
            const questionWords = /(apa|siapa|dimana|kapan|kenapa|bagaimana|what|who|where|when|why|how|what is|who is|where is|什么是|是什么|どこ|何|ما هو|кто|что|qué|qui|quoi|was|wer|wie|wo|o que|quem)/i;
            if (questionWords.test(input)) {
                // Try to search automatically for questions
                return { special: 'search', query: input.substring(0, 100), lang, auto: true };
            }

            // Default response in detected language
            const defs = responses[lang]?.default || responses['en']?.default || ["Hmm, I'm not sure what you mean. Try: 'search: [query]' or 'make [code type]'."];
            return defs[Math.floor(Math.random() * defs.length)];
        }

        function generateCode(language, input) {
            const l = input.toLowerCase();
            switch(language) {
                case 'html':
                    if (l.includes('button')||l.includes('tombol')) return genHTML('button');
                    if (l.includes('form')||l.includes('login')) return genHTML('form');
                    if (l.includes('table')||l.includes('tabel')) return genHTML('table');
                    if (l.includes('nav')||l.includes('menu')) return genHTML('navbar');
                    return genHTML('default');
                case 'css':
                    return `/* CSS by AI Hacker Neural */\n\n* {\n    margin: 0;\n    padding: 0;\n    box-sizing: border-box;\n}\n\nbody {\n    min-height: 100vh;\n    background: #0a0a0f;\n    color: #e0f0ff;\n    font-family: 'Arial', sans-serif;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n}\n\n.container {\n    text-align: center;\n    padding: 40px;\n}\n\nh1 {\n    color: #00ffff;\n    font-size: 2.5rem;\n    letter-spacing: 4px;\n    text-transform: uppercase;\n    margin-bottom: 16px;\n}\n\n.glow {\n    animation: glowPulse 2s ease-in-out infinite;\n}\n\n@keyframes glowPulse {\n    0%, 100% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff44; }\n    50% { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff66; }\n}`;
                case 'javascript':
                case 'js':
                    return `/**\n * JavaScript — AI Hacker Neural\n */\n\n// === Utility Functions ===\n\nfunction greet(name) {\n    return \`Hello, \${name}! Welcome to AI Hacker Neural.\`;\n}\n\nconst sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));\n\nasync function fetchData(url) {\n    try {\n        const res = await fetch(url);\n        if (!res.ok) throw new Error(\`HTTP \${res.status}\`);\n        return await res.json();\n    } catch (err) {\n        console.error('Fetch error:', err);\n        return null;\n    }\n}\n\n// === Example Usage ===\nconsole.log(greet('Hacker'));\nfetchData('https://api.example.com/users').then(console.log);`;
                case 'python':
                    return `#!/usr/bin/env python3\n\"\"\"\nPython Script — AI Hacker Neural\n\"\"\"\nimport sys\n\n\ndef main():\n    print(\"=\" * 50)\n    print(\"  AI HACKER NEURAL — Python Generator\")\n    print(\"=\" * 50)\n    \n    name = input(\"Enter your name: \")\n    print(f\"Hello {name}, ready to hack ethically? 🔥\")\n    \n    tools = [\"Nmap\", \"SQLMap\", \"Metasploit\", \"BurpSuite\", \"Wireshark\"]\n    print(\"\\nEssential tools:\")\n    for i, tool in enumerate(tools, 1):\n        print(f\"  {i}. {tool}\")\n\n\nif __name__ == \"__main__\":\n    main()`;
                case 'php':
                    return `<?php\n/**\n * PHP Script — AI Hacker Neural\n */\n\n// Database connection\nfunction connectDB($host, $user, $pass, $db) {\n    try {\n        $pdo = new PDO("mysql:host=$host;dbname=$db;charset=utf8", $user, $pass, [\n            PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,\n            PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,\n        ]);\n        return $pdo;\n    } catch (PDOException $e) {\n        die("Connection failed: " . $e->getMessage());\n    }\n}\n\n// Route handler\nfunction route($uri) {\n    $routes = [\n        '/' => 'Home',\n        '/login' => 'Login',\n        '/admin' => 'Admin Panel',\n    ];\n    return $routes[$uri] ?? '404 Not Found';\n}\n\necho route($_SERVER['REQUEST_URI'] ?? '/');`;
                case 'sql':
                    return `-- SQL Schema — AI Hacker Neural\n\nCREATE DATABASE IF NOT EXISTS ai_hacker_db;\nUSE ai_hacker_db;\n\n-- Users table\nCREATE TABLE users (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    username VARCHAR(50) UNIQUE NOT NULL,\n    email VARCHAR(100) UNIQUE NOT NULL,\n    password_hash VARCHAR(255) NOT NULL,\n    role ENUM('admin', 'user') DEFAULT 'user',\n    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\n-- Sessions table\nCREATE TABLE sessions (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    user_id INT NOT NULL,\n    token VARCHAR(255) NOT NULL,\n    expires_at DATETIME NOT NULL,\n    FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE\n);\n\n-- Indexes\nCREATE INDEX idx_users_email ON users(email);\nCREATE INDEX idx_sessions_token ON sessions(token);`;
                default:
                    return `// Code — AI Hacker Neural\n// Supported: HTML, CSS, JS, Python, PHP, SQL\nconsole.log("Specify a language!");`;
            }
        }

        return { think, detectIntent };
    })();


    // ====================================================================
    //  5. CHAT CONTROLLER
    // ====================================================================
    (function initChat() {
        const messagesEl = document.getElementById('chatMessages');
        const inputEl = document.getElementById('chatInput');
        const btnSend = document.getElementById('btnSend');
        const langLabel = document.getElementById('langLabel');
        let currentLang = 'id';

        function scrollDown() {
            setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 20);
        }

        function escapeHtml(text) {
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function formatText(text) {
            // Code blocks
            let html = text.replace(/```([\s\S]*?)```/g, (m, code) => {
                const id = 'cb_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
                const escaped = escapeHtml(code);
                return `<pre id="${id}">${escaped}</pre><button class="copy-btn" data-target="${id}" onclick="copyCode('${id}')">[ COPY ]</button>`;
            });
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--cyan);">$1</strong>');
            html = html.replace(/_(.*?)_/g, '<em style="color:rgba(255,255,255,0.5);">$1</em>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = role === 'ai' ? 'AI HACKER NEURAL' : 'KAMU';
            div.appendChild(label);
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (role === 'ai' && content === '__TYPING__') {
                const dots = document.createElement('span');
                dots.className = 'typing-dots';
                dots.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(dots);
            } else if (typeof content === 'string') {
                bubble.innerHTML = formatText(content);
            }

            div.appendChild(bubble);
            messagesEl.appendChild(div);
            scrollDown();
            return div;
        }

        function removeTyping() {
            const msgs = messagesEl.querySelectorAll('.message.ai');
            if (msgs.length) {
                const last = msgs[msgs.length-1];
                if (last.querySelector('.typing-dots')) last.remove();
            }
        }

        function addSearchResults(results, query) {
            const div = document.createElement('div');
            div.className = 'message ai';
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = 'AI HACKER NEURAL';
            div.appendChild(label);
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            let html = `<div style="color:var(--cyan);font-weight:600;margin-bottom:6px;">🔍 Hasil pencarian: <span style="color:#fff;">${escapeHtml(query)}</span></div>`;

            let count = 0;
            // Process DDG results
            if (results.ddg && results.ddg.length) {
                for (const r of results.ddg) {
                    if (count >= 5) break;
                    html += `<div class="search-result">`;
                    if (r.title) html += `<div class="sr-title">${escapeHtml(r.title)}</div>`;
                    if (r.text) html += `<div class="sr-snippet">${escapeHtml(r.text.substring(0, 200))}</div>`;
                    if (r.url) html += `<div class="sr-url">🔗 ${escapeHtml(r.url)}</div>`;
                    html += `</div>`;
                    count++;
                }
            }

            // If DDG had an abstract/answer, use that as primary
            if (results.ddg && results.ddg.length && results.ddg[0].type === 'answer') {
                html = `<div style="color:var(--cyan);font-weight:600;margin-bottom:6px;">💡 Info: <span style="color:#fff;">${escapeHtml(query)}</span></div>`;
                html += `<div class="search-result">`;
                html += `<div class="sr-title">${escapeHtml(results.ddg[0].title)}</div>`;
                html += `<div style="color:#e0f0ff;margin:4px 0;">${escapeHtml(results.ddg[0].text.substring(0, 500))}</div>`;
                if (results.ddg[0].url) html += `<div class="sr-url">🔗 ${escapeHtml(results.ddg[0].url)}</div>`;
                html += `</div>`;
                count = 1;
            }

            // Wiki extract
            if (results.wikiExtract) {
                if (count < 5) {
                    html += `<div style="color:var(--green);font-weight:600;margin:8px 0 4px 0;">📚 Wikipedia:</div>`;
                    html += `<div class="search-result">`;
                    html += `<div style="color:#e0f0ff;font-size:13px;">${escapeHtml(results.wikiExtract.substring(0, 600))}</div>`;
                    html += `</div>`;
                }
            } else if (results.wiki && results.wiki.length) {
                if (count < 4) {
                    html += `<div style="color:var(--green);font-weight:600;margin:8px 0 4px 0;">📚 Wikipedia:</div>`;
                    for (const w of results.wiki.slice(0, 2)) {
                        html += `<div class="search-result">`;
                        html += `<div class="sr-title">${escapeHtml(w.title)}</div>`;
                        html += `<div class="sr-snippet">${escapeHtml(w.text.substring(0, 150))}</div>`;
                        html += `<div class="sr-url">🔗 ${escapeHtml(w.url)}</div>`;
                        html += `</div>`;
                    }
                }
            }

            if (count === 0) {
                html += `<div style="color:rgba(255,255,255,0.3);">Tidak ada hasil yang ditemukan untuk "${escapeHtml(query)}"</div>`;
            }

            html += `<div class="search-notice">🔍 DuckDuckGo + Wikipedia</div>`;

            bubble.innerHTML = html;
            div.appendChild(bubble);
            messagesEl.appendChild(div);
            scrollDown();
        }

        function addURLResult(result) {
            const div = document.createElement('div');
            div.className = 'message ai';
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = 'AI HACKER NEURAL';
            div.appendChild(label);
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (!result) {
                bubble.innerHTML = `<div style="color:rgba(255,100,100,0.7);">❌ Gagal mengambil URL. Mungkin diblokir CORS atau URL tidak valid.</div>`;
            } else {
                let html = `<div style="color:var(--cyan);font-weight:600;">🔗 Hasil: <span style="color:#fff;">${escapeHtml(result.title)}</span></div>`;
                html += `<div class="sr-url" style="margin-bottom:6px;">${escapeHtml(result.url)}</div>`;
                html += `<pre style="font-size:11px;max-height:300px;overflow-y:auto;">${escapeHtml(result.content.substring(0, 2000))}</pre>`;
                html += `<div class="search-notice">📄 ${result.fullLength} karakter — via CORS Proxy</div>`;
                bubble.innerHTML = html;
            }
            div.appendChild(bubble);
            messagesEl.appendChild(div);
            scrollDown();
        }

        async function respond(userText) {
            const detectedLang = LangDetector.detect(userText);
            currentLang = detectedLang;
            langLabel.textContent = LangDetector.getName(detectedLang);

            // Show typing
            addMessage('ai', '__TYPING__');

            // Process
            const result = await AIBrain.think(userText, detectedLang);

            setTimeout(async () => {
                removeTyping();

                if (result === '__CLEAR__') {
                    messagesEl.innerHTML = '';
                    setTimeout(() => addMessage('ai', 'Chat dibersihkan! Siap lagi 🔄'), 50);
                    return;
                }

                // Handle special async results
                if (result && typeof result === 'object' && result.special === 'search') {
                    // Show searching indicator
                    const searchNotice = addMessage('ai', '__TYPING__');
                    // Perform search
                    try {
                        const searchResults = await OnlineEngine.search(result.query, result.lang);
                        removeTyping();
                        addSearchResults(searchResults, result.query);
                    } catch(e) {
                        removeTyping();
                        addMessage('ai', '❌ Gagal melakukan pencarian. Coba lagi nanti.');
                    }
                    return;
                }

                if (result && typeof result === 'object' && result.special === 'fetch') {
                    addMessage('ai', '⏳ Mengambil konten dari URL...');
                    try {
                        const fetchResult = await OnlineEngine.fetchURL(result.url);
                        // Remove the loading message
                        const msgs = messagesEl.querySelectorAll('.message.ai');
                        if (msgs.length) {
                            const last = msgs[msgs.length-1];
                            if (last.textContent.includes('Mengambil konten')) last.remove();
                        }
                        addURLResult(fetchResult);
                    } catch(e) {
                        const msgs = messagesEl.querySelectorAll('.message.ai');
                        if (msgs.length) {
                            const last = msgs[msgs.length-1];
                            if (last.textContent.includes('Mengambil konten')) last.remove();
                        }
                        addMessage('ai', '❌ Gagal mengambil URL. Error: ' + e.message);
                    }
                    return;
                }

                // Normal text response
                addMessage('ai', result);
            }, 500 + Math.random() * 300);
        }

        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage('user', text);
            inputEl.value = '';
            inputEl.style.height = 'auto';
            respond(text);
        }

        // Events
        btnSend.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + 'px';
        });

        // Welcome
        setTimeout(() => {
            addMessage('ai', '🧠 **AI Hacker Neural v5.0** online! Otak AI multi-bahasa + search engine.\n\n🌐 Gue bisa deteksi bahasa lo & jawab pake bahasa yang sama.\n🔍 **"cari: [kata kunci]"** — cari info dari web\n🔗 **"buka: [url]"** — ambil konten dari link\n💻 **"buatkan html button"** — generate kode\n📚 **"siapa presiden Indonesia?"** — auto-search!\n\nKetik `/help` buat panduan lengkap.');
        }, 500);

        // 3D mouse tracking
        const wrapper = document.getElementById('chatWrapper');
        document.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
            const dx = (e.clientX - cx)/rect.width, dy = (e.clientY - cy)/rect.height;
            if (window.innerWidth > 540) {
                wrapper.style.transform = `rotateX(${-dy*4}deg) rotateY(${dx*4}deg) translateZ(30px)`;
            }
        });
        document.addEventListener('mouseleave', () => {
            if (window.innerWidth > 540) wrapper.style.transform = 'rotateX(2deg) rotateY(-1deg) translateZ(30px)';
        });
    })();

    // Copy function (global)
    window.copyCode = function(id) {
        const pre = document.getElementById(id);
        if (!pre) return;
        const code = pre.textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(`[data-target="${id}"]`);
                if (btn) { btn.textContent = '[ COPIED! ]'; btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '[ COPY ]'; btn.classList.remove('copied'); }, 2000); }
            }).catch(() => fallbackCopy(code, id));
        } else fallbackCopy(code, id);
    };
    function fallbackCopy(text, id) {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy');
            const btn = document.querySelector(`[data-target="${id}"]`);
            if (btn) { btn.textContent = '[ COPIED! ]'; btn.classList.add('copied');
                setTimeout(() => { btn.textContent = '[ COPY ]'; btn.classList.remove('copied'); }, 2000); }
        } catch(e) {}
        document.body.removeChild(ta);
    }
</script>
