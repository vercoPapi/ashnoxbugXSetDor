<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TMY Logo</title>
<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
canvas{
    background:transparent;
}
</style>
</head>
<body>

<canvas id="canvas" width="300" height="300"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const cx = 150;
const cy = 150;
const r = 80;

// Efek bulat 3D ungu
const grad = ctx.createRadialGradient(
    cx - 25, cy - 25, 10,
    cx, cy, r
);

grad.addColorStop(0, "#e0b3ff");
grad.addColorStop(0.4, "#b84dff");
grad.addColorStop(0.75, "#7a00cc");
grad.addColorStop(1, "#2b003d");

// Lingkaran utama
ctx.beginPath();
ctx.arc(cx, cy, r, 0, Math.PI * 2);
ctx.fillStyle = grad;
ctx.fill();

// Glow ungu
ctx.shadowColor = "#b84dff";
ctx.shadowBlur = 25;
ctx.beginPath();
ctx.arc(cx, cy, r, 0, Math.PI * 2);
ctx.strokeStyle = "#d580ff";
ctx.lineWidth = 4;
ctx.stroke();

// Reset shadow
ctx.shadowBlur = 0;

// Highlight 3D
ctx.beginPath();
ctx.arc(cx - 20, cy - 20, 22, 0, Math.PI * 2);
ctx.fillStyle = "rgba(255,255,255,0.25)";
ctx.fill();

// Tulisan TMY
ctx.font = "bold 28px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillStyle = "#ffffff";
ctx.fillText("TMY", cx, cy);
</script>

</body>
</html>
